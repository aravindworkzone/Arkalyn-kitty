services:
  - type: web
    name: arkalyn-mcp
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: API_BASE_URL
        sync: false # set to your Arkalyn Kitty backend URL (no trailing slash)
      - key: PORT
        value: 3001
